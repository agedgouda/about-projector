<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ title ?? "App" }}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{ vite src="resources/js/site.js|resources/css/site.css" }}
</head>

<body class="bg-white text-zinc-900 antialiased">

  <header class="border-b border-zinc-200">
    <nav class="mx-auto max-w-6xl px-6 h-16 flex items-center gap-8">
      <a href="/" class="font-semibold text-lg text-zinc-900 hover:text-indigo-600">Home</a>
      {{ nav:main }}
        <a href="{{ url }}" class="text-sm text-zinc-600 hover:text-indigo-600 font-medium">{{ title }}</a>
      {{ /nav:main }}
    </nav>
  </header>

  <main>
    {{ template_content }}
  </main>

  <footer class="border-t border-zinc-200 mt-20">
    <div class="mx-auto max-w-6xl px-6 py-8 text-sm text-zinc-500">
      © {{ now format="Y" }} All rights reserved.
    </div>
  </footer>

</body>
</html>
